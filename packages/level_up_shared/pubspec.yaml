name: level_up_shared
description: "Models and views shared between level_up and level_up_coach"
version: 0.0.1
resolution: workspace

environment:
  sdk: ^3.7.2
  flutter: ">=1.17.0"

dependencies:
  cloud_firestore: ^6.1.0
  firebase_auth: ^6.1.2
  firebase_storage: ^13.0.4
  flutter:
    sdk: flutter
  flutter_svg: ^2.1.0
  go_router: ^17.0.1
  google_sign_in: ^7.2.0
  image_cropper: ^11.0.0
  image_picker: ^1.1.2
  rxdart: ^0.28.0
  shared_preferences: ^2.5.3
  video_player: ^2.9.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/apple_white.svg
    - lib/assets/images/google_icon.png
