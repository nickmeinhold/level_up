name: level_up_web
description: "LevelUp Website"
publish_to: 'none'
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.7.2

dependencies:
  chewie: ^1.11.3
  cloud_firestore: ^6.1.0
  cloud_functions: ^6.0.4
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  flutter:
    sdk: flutter
  go_router: ^17.0.1
  http: ^1.3.0
  level_up_shared:
    path: ../../packages/level_up_shared
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  video_player: ^2.9.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: false
  ios: false
  web:
    generate: true
    image_path: "assets/icons/icon.png"
  # Run: dart run flutter_launcher_icons:main
