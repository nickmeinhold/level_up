name: level_up_client
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.7.0

dependencies:
  audioplayers: ^6.4.0
  camera: ^0.12.0+1
  cloud_firestore: ^6.1.0
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  firebase_storage: ^13.0.4
  flutter:
    sdk: flutter
  go_router: ^17.0.1
  level_up_shared:
    path: ../../packages/level_up_shared
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  vibration: ^3.1.3
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/google_icon.png
    - assets/images/opening_screen.jpg
    - assets/audio/alarm.mp3
  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/icons.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/icons/android_icon.png"  # Android-specific
  image_path_ios: "assets/icons/ios_icon.png"  
  min_sdk_android: 21  # Optional: set minimum Android SDK
  # remove_alpha_ios: true  # Optional: removes transparency for iOS
  # Run: dart run flutter_launcher_icons:main

flutter_native_splash: 
  android_12:
    image: assets/images/android_splash_screen.png
  color: "#ffffff"
  fullscreen: true
  android: true
  ios: false
  web: false 
  # Run: dart run flutter_native_splash:create
