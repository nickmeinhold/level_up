name: level_up
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  audioplayers: ^6.4.0
  camera: ^0.11.1
  cloud_firestore: ^5.6.5
  firebase_auth: ^5.5.1
  firebase_core: ^3.12.1
  firebase_storage: ^12.4.4
  flutter:
    sdk: flutter
  go_router: ^15.0.0
  google_sign_in: ^6.3.0
  level_up_shared:
    path: ../level_up_shared
  path: ^1.9.1
  path_provider: ^2.1.5
  rxdart: ^0.28.0
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  vibration: ^3.1.3
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/google_icon.png
    - assets/images/opening_screen.jpg
    - assets/images/trial_workout.jpg
    - assets/images/workout1.jpg
    - assets/images/workout2.jpg
    - assets/audio/alarm.mp3
  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/icons.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/icons/android_icon.png"  # Android-specific
  image_path_ios: "assets/icons/ios_icon.png"  
  # min_sdk_android: 21  # Optional: set minimum Android SDK
  # remove_alpha_ios: true  # Optional: removes transparency for iOS
