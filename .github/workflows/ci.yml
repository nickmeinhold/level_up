name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          else
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} 2>/dev/null || echo "")
          fi
          NON_DOCS=$(echo "$CHANGED" | grep -vE '\.(md|txt)$|^LICENSE$' || true)
          if [ -z "$NON_DOCS" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Flutter / Dart
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage

      # Cloud Functions (TypeScript)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/level_up_shared/functions/package-lock.json
      - run: npm ci
        working-directory: packages/level_up_shared/functions
      - run: npm run build
        working-directory: packages/level_up_shared/functions
      - run: npm test
        working-directory: packages/level_up_shared/functions

  # Pass when docs-only so branch protection doesn't block
  test-skip:
    name: Test
    needs: changes
    if: needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipping tests"
